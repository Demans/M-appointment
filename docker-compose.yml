version: "3.8"
services:
  watcher:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - FRONTDESK_WITNESS_CHOICE
      - FRONTDESK_AUTO_CLICK_FIRST_SLOT
    # Persist state using a named volume so hosts/providers create it automatically
    volumes:
      - watcher_state:/usr/src/app/state
    # If you want to run in foreground and see logs, override command
    # command: ["python", "frontdesk_watch.py"]

volumes:
  watcher_state:
